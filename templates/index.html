<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Integer Calculator</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      padding: 2rem;
      width: 100%;
      max-width: 420px;
    }

    h1 {
      font-size: 1.5rem;
      color: #1a1a2e;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }

    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      background: #f3f4f6;
      padding: 0.35rem;
      border-radius: 10px;
    }

    .tab {
      flex: 1;
      padding: 0.6rem 0.75rem;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: #555;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .tab:hover {
      color: #333;
    }

    .tab.active {
      background: #fff;
      color: #667eea;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .panel {
      display: none;
    }

    .panel.active {
      display: block;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #444;
      margin-bottom: 0.35rem;
    }

    .field {
      margin-bottom: 1rem;
    }

    input[type="number"] {
      width: 100%;
      padding: 0.65rem 0.75rem;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.2s;
    }

    input[type="number"]:focus {
      outline: none;
      border-color: #667eea;
    }

    button[type="submit"] {
      width: 100%;
      padding: 0.75rem;
      margin-top: 0.5rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button[type="submit"]:hover {
      opacity: 0.9;
    }

    .result {
      margin-top: 1.5rem;
      padding: 1rem;
      background: #f0fdf4;
      border: 1px solid #86efac;
      border-radius: 8px;
      text-align: center;
    }

    .result-label {
      font-size: 0.85rem;
      color: #166534;
      margin-bottom: 0.25rem;
    }

    .result-value {
      font-size: 2rem;
      font-weight: 700;
      color: #15803d;
    }

    .error {
      margin-top: 1rem;
      padding: 0.75rem;
      background: #fef2f2;
      border: 1px solid #fca5a5;
      border-radius: 8px;
      color: #b91c1c;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Integer Calculator</h1>
    <p class="subtitle">Add or multiply two integers.</p>

    <div class="tabs">
      <button
        type="button"
        class="tab{% if active_tab == 'sum' %} active{% endif %}"
        data-tab="sum"
      >
        Sum
      </button>
      <button
        type="button"
        class="tab{% if active_tab == 'multiply' %} active{% endif %}"
        data-tab="multiply"
      >
        Multiply
      </button>
    </div>

    <div id="panel-sum" class="panel{% if active_tab == 'sum' %} active{% endif %}">
      <form method="POST">
        <input type="hidden" name="operation" value="sum">
        <div class="field">
          <label for="sum-num1">First number</label>
          <input
            type="number"
            id="sum-num1"
            name="num1"
            step="1"
            placeholder="e.g. 42"
            value="{% if active_tab == 'sum' %}{{ num1 }}{% endif %}"
            required
          >
        </div>
        <div class="field">
          <label for="sum-num2">Second number</label>
          <input
            type="number"
            id="sum-num2"
            name="num2"
            step="1"
            placeholder="e.g. 58"
            value="{% if active_tab == 'sum' %}{{ num2 }}{% endif %}"
            required
          >
        </div>
        <button type="submit">Calculate Sum</button>
      </form>
    </div>

    <div id="panel-multiply" class="panel{% if active_tab == 'multiply' %} active{% endif %}">
      <form method="POST">
        <input type="hidden" name="operation" value="multiply">
        <div class="field">
          <label for="mul-num1">First number</label>
          <input
            type="number"
            id="mul-num1"
            name="num1"
            step="1"
            placeholder="e.g. 6"
            value="{% if active_tab == 'multiply' %}{{ num1 }}{% endif %}"
            required
          >
        </div>
        <div class="field">
          <label for="mul-num2">Second number</label>
          <input
            type="number"
            id="mul-num2"
            name="num2"
            step="1"
            placeholder="e.g. 7"
            value="{% if active_tab == 'multiply' %}{{ num2 }}{% endif %}"
            required
          >
        </div>
        <button type="submit">Calculate Product</button>
      </form>
    </div>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    {% if result is not none %}
      <div class="result">
        <div class="result-label">Result</div>
        <div class="result-value">{{ num1 }} {{ operator }} {{ num2 }} = {{ result }}</div>
      </div>
    {% endif %}
  </div>

  <script>
    const tabs = document.querySelectorAll(".tab");
    const panels = document.querySelectorAll(".panel");

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        const target = tab.dataset.tab;

        tabs.forEach((t) => t.classList.remove("active"));
        panels.forEach((p) => p.classList.remove("active"));

        tab.classList.add("active");
        document.getElementById(`panel-${target}`).classList.add("active");
      });
    });
  </script>
</body>
</html>
