<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Integer Sum Calculator</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      padding: 2rem;
      width: 100%;
      max-width: 420px;
    }

    h1 {
      font-size: 1.5rem;
      color: #1a1a2e;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #444;
      margin-bottom: 0.35rem;
    }

    .field {
      margin-bottom: 1rem;
    }

    input[type="number"] {
      width: 100%;
      padding: 0.65rem 0.75rem;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.2s;
    }

    input[type="number"]:focus {
      outline: none;
      border-color: #667eea;
    }

    button {
      width: 100%;
      padding: 0.75rem;
      margin-top: 0.5rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:hover {
      opacity: 0.9;
    }

    .result {
      margin-top: 1.5rem;
      padding: 1rem;
      background: #f0fdf4;
      border: 1px solid #86efac;
      border-radius: 8px;
      text-align: center;
    }

    .result-label {
      font-size: 0.85rem;
      color: #166534;
      margin-bottom: 0.25rem;
    }

    .result-value {
      font-size: 2rem;
      font-weight: 700;
      color: #15803d;
    }

    .error {
      margin-top: 1rem;
      padding: 0.75rem;
      background: #fef2f2;
      border: 1px solid #fca5a5;
      border-radius: 8px;
      color: #b91c1c;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Integer Sum Calculator</h1>
    <p class="subtitle">Enter two integers to add them together.</p>

    <form method="POST">
      <div class="field">
        <label for="num1">First number</label>
        <input
          type="number"
          id="num1"
          name="num1"
          step="1"
          placeholder="e.g. 42"
          value="{{ num1 }}"
          required
        >
      </div>

      <div class="field">
        <label for="num2">Second number</label>
        <input
          type="number"
          id="num2"
          name="num2"
          step="1"
          placeholder="e.g. 58"
          value="{{ num2 }}"
          required
        >
      </div>

      <button type="submit">Calculate Sum</button>
    </form>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    {% if result is not none %}
      <div class="result">
        <div class="result-label">Result</div>
        <div class="result-value">{{ num1 }} + {{ num2 }} = {{ result }}</div>
      </div>
    {% endif %}
  </div>
</body>
</html>
